<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="selector.js"></script>
    <title>Falle - German Case Trainer</title>
  </head>
  <body>
    <div class="messages" id="messages"></div>

    <div class="mainSelectorContainer">
      <div class="secondarySelectorContainer">
        <h2>Cases</h2>
        <div>
          <form id="cases"></form>
        </div>
      </div>

      <div class="secondarySelectorContainer">
        <h2>Sentence sets</h2>
        <div>
          <form id="sets"></form>
        </div>
      </div>
    </div>

    <div>
      <a class="button" id="doneButton">Done</a>
    </div>
  </body>
</html>
