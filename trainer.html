<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="trainer.js"></script>
    <title>Falle - Trainer</title>
  </head>
  <body>
    <div class="messages" id="messages"></div>

    <div class="maincontainer">
      <div class="secondarycontainer">
        <div class="chip" id="caseChip">case</div>
        <div class="chip" id="setChip">set</div>
      </div>

      <div class="secondarycontainer">
        <div class="prompt" id="promptText">Prompt</div>
      </div>

      <div class="secondarycontainer">
        <input class="textinput" id="input" autocomplete="off" placeholder="Type the missing article" />
      </div>

      <div class="secondarycontainer">
        <a class="button" id="check">Check</a>
        <a class="button" id="hint">Hint</a>
      </div>
    </div>
  </body>
</html>
